<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let heroImg = new Image();
heroImg.src = "../assets/hero.png";

/* ================= BULLET SETTINGS ================= */

let equipped = localStorage.getItem("equippedBullet") || "default";

let bulletColor="yellow";
let bulletDamage=1;
let bulletSize=6;

if(equipped==="rare"){ bulletColor="cyan"; bulletDamage=2; bulletSize=8; }
if(equipped==="epic"){ bulletColor="violet"; bulletDamage=3; bulletSize=10; }
if(equipped==="legendary"){ bulletColor="gold"; bulletDamage=5; bulletSize=14; }

/* =================================================== */

let player={
    x:canvas.width/2,
    y:canvas.height/2,
    size:220,
    speed:4,
    health:100,
    angle:0
};

let bullets=[];
let enemies=[];
let cracks=[];
let particles=[];
let keys={};
let mouse={x:0,y:0};
let wave=1;
let gameOver=false;

document.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
document.addEventListener("click",shoot);

/* ================= SHOOT ================= */

function shoot(){
    if(gameOver) return;

    let aspect = heroImg.naturalWidth / heroImg.naturalHeight;
    let width = player.size;
    let height = width / aspect;

    // Nose position (forward direction)
    let noseX = player.x + Math.cos(player.angle - Math.PI/2) * (height/2);
    let noseY = player.y + Math.sin(player.angle - Math.PI/2) * (height/2);

    let bulletSpeed = 10;

    bullets.push({
        x:noseX,
        y:noseY,
        dx:Math.cos(player.angle - Math.PI/2) * bulletSpeed,
        dy:Math.sin(player.angle - Math.PI/2) * bulletSpeed,
        size:bulletSize
    });
}

/* ========================================= */

function spawnEnemy(){
    let edge=Math.floor(Math.random()*4);
    let x,y;

    if(edge===0){x=0;y=Math.random()*canvas.height;}
    if(edge===1){x=canvas.width;y=Math.random()*canvas.height;}
    if(edge===2){x=Math.random()*canvas.width;y=0;}
    if(edge===3){x=Math.random()*canvas.width;y=canvas.height;}

    enemies.push({
        x,y,
        size:40,
        speed:1.5+wave*0.2,
        health:3+wave
    });
}

function update(){

    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;
    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;

    player.x=Math.max(player.size/2,Math.min(canvas.width-player.size/2,player.x));
    player.y=Math.max(player.size/2,Math.min(canvas.height-player.size/2,player.y));

    // ROTATE TOWARD MOUSE
    player.angle = Math.atan2(mouse.y-player.y, mouse.x-player.x) + Math.PI/2;

    // BULLETS
    for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i];
        b.x+=b.dx;
        b.y+=b.dy;

        // remove if off screen
        if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height){
            bullets.splice(i,1);
            continue;
        }

        for(let j=enemies.length-1;j>=0;j--){
            let e=enemies[j];

            if(Math.hypot(b.x-e.x,b.y-e.y)<e.size/2){

                e.health-=bulletDamage;

                cracks.push({
                    x:e.x,
                    y:e.y,
                    life:12,
                    size:e.size/2
                });

                bullets.splice(i,1);

                if(e.health<=0){
                    enemies.splice(j,1);
                }

                break;
            }
        }
    }

    cracks.forEach(c=>c.life--);
    cracks=cracks.filter(c=>c.life>0);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // DRAW ROTATED PLAYER
    ctx.save();
    ctx.translate(player.x,player.y);
    ctx.rotate(player.angle);

    let aspect=heroImg.naturalWidth/heroImg.naturalHeight;
    let width=player.size;
    let height=width/aspect;

    ctx.drawImage(heroImg,-width/2,-height/2,width,height);
    ctx.restore();

    // BULLETS
    ctx.fillStyle=bulletColor;
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    // ENEMIES
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.size/2,0,Math.PI*2);
        ctx.fill();
    });

    // CRACK EFFECT
    cracks.forEach(c=>{
        ctx.strokeStyle="white";
        ctx.beginPath();
        for(let i=0;i<6;i++){
            let angle=Math.random()*Math.PI*2;
            let length=Math.random()*c.size;
            ctx.moveTo(c.x,c.y);
            ctx.lineTo(
                c.x+Math.cos(angle)*length,
                c.y+Math.sin(angle)*length
            );
        }
        ctx.stroke();
    });
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

for(let i=0;i<3;i++) spawnEnemy();
loop();

</script>
