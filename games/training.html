<!DOCTYPE html>
<html>
<head>
<title>Abu's Training Ground</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    color:white;
    background:linear-gradient(135deg,#1a2a6c,#b21f1f,#fdbb2d);
}
canvas{display:block;}

.ui{
    position:absolute;
    top:10px;
    left:15px;
    font-size:18px;
    background:rgba(0,0,0,0.4);
    padding:10px 15px;
    border-radius:10px;
}

.ui button{
    margin-top:8px;
    padding:5px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#gameOverScreen{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 25px red;
}

#gameOverScreen button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>
<body>

<div class="ui">
❤️ Health: <span id="health">100</span> |
🌊 Wave: <span id="wave">1</span> |
🪙 Coins: <span id="coins">0</span> |
🏆 Highscore: <span id="highscore">0</span>
<br>
<button onclick="goHome()">🏠 Home</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="gameOverScreen">
<h2>💀 Game Over</h2>
<button onclick="restartGame()">Restart</button>
<button onclick="goHome()">Home</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let heroImg = new Image();
heroImg.src = "../assets/hero.png";

/* ===== BULLET SETTINGS ===== */
let equipped = localStorage.getItem("equippedBullet") || "default";

let bulletColor="yellow";
let bulletDamage=1;
let bulletSize=6;

if(equipped==="rare"){
    bulletColor="cyan";
    bulletDamage=2;
    bulletSize=8;
}
if(equipped==="epic"){
    bulletColor="violet";
    bulletDamage=3;
    bulletSize=10;
}
if(equipped==="legendary"){
    bulletColor="gold";
    bulletDamage=5;
    bulletSize=14;
}
/* ============================ */

let coins=parseInt(localStorage.getItem("coins"))||0;
let highscore=parseInt(localStorage.getItem("highscore"))||0;

document.getElementById("coins").innerText=coins;
document.getElementById("highscore").innerText=highscore;

let player={
    x:canvas.width/2,
    y:canvas.height/2,
    size:220,
    speed:4,
    health:100
};

let bullets=[];
let enemies=[];
let cracks=[];
let particles=[];
let keys={};
let wave=1;
let gameOver=false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
document.addEventListener("click",shoot);

/* =============================
   SHOOT — ALWAYS VERTICAL
=============================*/
function shoot(){
    if(gameOver) return;

    let aspect = heroImg.naturalWidth / heroImg.naturalHeight;
    let width = player.size;
    let height = width / aspect;

    let noseX = player.x;
    let noseY = player.y - height/2;

    bullets.push({
        x:noseX,
        y:noseY,
        dx:0,
        dy:-10,
        size:bulletSize
    });
}
/* ============================ */

function spawnEnemy(){
    let edge=Math.floor(Math.random()*4);
    let x,y;

    if(edge===0){x=0;y=Math.random()*canvas.height;}
    if(edge===1){x=canvas.width;y=Math.random()*canvas.height;}
    if(edge===2){x=Math.random()*canvas.width;y=0;}
    if(edge===3){x=Math.random()*canvas.width;y=canvas.height;}

    enemies.push({
        x,y,
        size:40,
        speed:1.5+wave*0.2,
        health:3+wave
    });
}

function update(){

    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;
    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;

    player.x=Math.max(player.size/2,Math.min(canvas.width-player.size/2,player.x));
    player.y=Math.max(player.size/2,Math.min(canvas.height-player.size/2,player.y));

    /* BULLETS */
    for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i];
        b.x+=b.dx;
        b.y+=b.dy;

        if(b.y<0){
            bullets.splice(i,1);
            continue;
        }

        for(let j=enemies.length-1;j>=0;j--){
            let e=enemies[j];

            if(Math.hypot(b.x-e.x,b.y-e.y)<e.size/2){

                e.health-=bulletDamage;

                cracks.push({
                    x:e.x,
                    y:e.y,
                    life:15,
                    size:e.size/2
                });

                bullets.splice(i,1);

                if(e.health<=0){

                    for(let p=0;p<15;p++){
                        particles.push({
                            x:e.x,
                            y:e.y,
                            dx:(Math.random()-0.5)*6,
                            dy:(Math.random()-0.5)*6,
                            life:30
                        });
                    }

                    enemies.splice(j,1);
                    coins+=5;
                    localStorage.setItem("coins",coins);
                    document.getElementById("coins").innerText=coins;
                }

                break;
            }
        }
    }

    /* CRACKS */
    for(let i=cracks.length-1;i>=0;i--){
        cracks[i].life--;
        if(cracks[i].life<=0) cracks.splice(i,1);
    }

    /* PARTICLES */
    for(let i=particles.length-1;i>=0;i--){
        let p=particles[i];
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;
        if(p.life<=0) particles.splice(i,1);
    }

    /* ENEMIES MOVE */
    enemies.forEach(e=>{
        let angle=Math.atan2(player.y-e.y,player.x-e.x);
        e.x+=Math.cos(angle)*e.speed;
        e.y+=Math.sin(angle)*e.speed;

        if(Math.hypot(player.x-e.x,player.y-e.y)<50){
            player.health-=0.5;
            document.getElementById("health").innerText=Math.floor(player.health);
        }
    });

    if(player.health<=0 && !gameOver){
        gameOver=true;
        document.getElementById("gameOverScreen").style.display="block";

        if(wave>highscore){
            highscore=wave;
            localStorage.setItem("highscore",highscore);
            document.getElementById("highscore").innerText=highscore;
        }
    }

    if(enemies.length===0 && !gameOver){
        wave++;
        document.getElementById("wave").innerText=wave;
        for(let i=0;i<wave*3;i++) spawnEnemy();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* PLAYER */
    ctx.save();
    ctx.translate(player.x,player.y);

    let aspect=heroImg.naturalWidth/heroImg.naturalHeight;
    let width=player.size;
    let height=width/aspect;

    ctx.drawImage(heroImg,-width/2,-height/2,width,height);
    ctx.restore();

    /* BULLETS */
    ctx.shadowBlur=15;
    ctx.shadowColor=bulletColor;
    ctx.fillStyle=bulletColor;

    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    ctx.shadowBlur=0;

    /* ENEMIES */
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.size/2,0,Math.PI*2);
        ctx.fill();
    });

    /* CRACK EFFECT */
    cracks.forEach(c=>{
        ctx.strokeStyle="white";
        ctx.lineWidth=2;
        ctx.beginPath();
        for(let i=0;i<6;i++){
            let angle=Math.random()*Math.PI*2;
            let length=Math.random()*c.size;
            ctx.moveTo(c.x,c.y);
            ctx.lineTo(
                c.x+Math.cos(angle)*length,
                c.y+Math.sin(angle)*length
            );
        }
        ctx.stroke();
    });

    /* PARTICLES */
    ctx.fillStyle="orange";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,4,0,Math.PI*2);
        ctx.fill();
    });
}

function restartGame(){
    player.health=100;
    player.x=canvas.width/2;
    player.y=canvas.height/2;
    bullets=[];
    enemies=[];
    cracks=[];
    particles=[];
    wave=1;
    gameOver=false;
    document.getElementById("health").innerText=100;
    document.getElementById("wave").innerText=1;
    document.getElementById("gameOverScreen").style.display="none";
    for(let i=0;i<3;i++) spawnEnemy();
}

function goHome(){
    window.location.href="../index.html";
}

function loop(){
    if(!gameOver){
        update();
        draw();
    }
    requestAnimationFrame(loop);
}

for(let i=0;i<3;i++) spawnEnemy();
loop();

</script>
</body>
</html>
